<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>豆包的识字之旅</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="shooting-star" style="--delay: 0;"></div>
    <div class="shooting-star" style="--delay: 1;"></div>
    <div class="shooting-star" style="--delay: 2;"></div>

    <div class="app">
        <!-- 顶部横幅 -->
        <header class="hero-banner">
            <div class="energy-ring"></div>
            <div class="energy-ring"></div>
            <div class="energy-ring"></div>
            <div class="ultraman-icon">⚡</div>
            <div class="hero-title">豆包的识字之旅</div>
            <div class="ultraman-icon">⚡</div>
        </header>

        <!-- 底部导航 -->
        <nav class="nav">
            <div class="nav-inner">
                <div class="nav-item active" data-page="record">识字记录</div>
                <div class="nav-item" data-page="wordbank">字库</div>
                <div class="nav-item" data-page="test">趣味测试</div>
                <div class="nav-item" data-page="achievement">成就</div>
            </div>
        </nav>

        <!-- 页面容器 -->
        <main class="pages">
            <!-- 识字记录页 -->
            <div class="page active" id="page-record">
                <div class="page-header">
                    <h2>识字记录</h2>
                    <div class="stats" id="record-stats">
                        <span id="hero-avatar-mini"></span>
                        已学 <span id="total-count">0</span> 个字
                    </div>
                </div>

                <div class="today-record">
                    <h3>今日打卡</h3>
                    <div class="input-group">
                        <input type="text" id="word-input" placeholder="输入认识的字，多个用空格分隔" maxlength="100">
                        <button id="add-btn">添加</button>
                    </div>
                </div>

                <div class="recent-words">
                    <h3>最近学习</h3>
                    <div id="recent-list" class="word-list"></div>
                </div>
            </div>

            <!-- 字库页 -->
            <div class="page" id="page-wordbank">
                <div class="page-header">
                    <h2>字库管理</h2>
                    <div class="stats">共 <span id="bank-count">0</span> 个字</div>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索汉字...">
                </div>
                <div class="action-buttons">
                    <button id="export-btn" class="btn-secondary">📥 导出</button>
                    <button id="import-btn" class="btn-secondary">📤 导入</button>
                </div>
                <input type="file" id="import-file" accept=".json,.txt" style="display: none;">
                <div id="wordbank-list" class="word-list"></div>
            </div>

            <!-- 趣味测试页 -->
            <div class="page" id="page-test">
                <div class="page-header">
                    <h2>趣味测试</h2>
                </div>
                <div class="test-config">
                    <label>题目数量：</label>
                    <select id="test-count">
                        <option value="5">5题</option>
                        <option value="10" selected>10题</option>
                        <option value="20">20题</option>
                    </select>
                </div>
                <button id="start-test" class="btn-primary">开始测试</button>
                <div id="test-area" class="test-area" style="display: none;">
                    <div class="progress">
                        第 <span id="current-question">1</span> / <span id="total-questions">10</span> 题
                    </div>
                    <div class="test-word" id="test-word">字</div>
                    <div class="test-options" id="test-options"></div>
                </div>
                <div id="test-result" class="test-result" style="display: none;">
                    <div class="score">得分：<span id="final-score">0</span> / <span id="total-score">0</span></div>
                    <div class="message" id="result-message"></div>
                    <button id="restart-test" class="btn-secondary">再来一次</button>
                </div>
            </div>

            <!-- 成就页 -->
            <div class="page" id="page-achievement">
                <div class="page-header">
                    <h2>成就</h2>
                </div>

                <!-- 奥特曼等级卡片 -->
                <div class="achievement-hero-card" id="hero-card">
                    <div class="hero-avatar" id="hero-avatar-main"></div>
                    <div class="hero-info">
                        <div class="hero-name" id="hero-name">光之国学员</div>
                        <div class="hero-word-count"><span id="hero-word-count">0</span> 字</div>
                        <div class="hero-progress-bar">
                            <div class="hero-progress-fill" id="hero-progress-fill"></div>
                        </div>
                        <div class="hero-progress-text" id="hero-progress-text"></div>
                    </div>
                </div>

                <!-- 今日状态 -->
                <div class="today-status-card">
                    <div class="section-title">📊 今日状态</div>
                    <div class="today-status-row">
                        <span>今日测试：<strong id="today-tests">0</strong> 次</span>
                        <span id="today-card-status">今日卡片：可获取</span>
                    </div>
                    <div class="streak-info">🔥 连续学习 <strong id="streak-days">0</strong> 天</div>
                </div>

                <!-- 识字水平 -->
                <div class="primary-level-card">
                    <div class="section-title">📈 识字水平</div>
                    <div class="primary-level-name" id="primary-level-name"></div>
                    <div class="primary-level-desc" id="primary-level-desc"></div>
                    <div class="primary-progress-bar">
                        <div class="primary-progress-fill" id="primary-progress-fill"></div>
                    </div>
                </div>

                <!-- 卡片收集 -->
                <div class="collection-section">
                    <div class="section-title">🎴 卡片收集 <span id="card-count-label"></span></div>

                    <div class="collection-group">
                        <div class="collection-group-title">技能卡片 21 张</div>
                        <div class="card-grid" id="skill-cards-grid"></div>
                    </div>

                    <div class="collection-group">
                        <div class="collection-group-title">武器卡片 12 张</div>
                        <div class="card-grid" id="weapon-cards-grid"></div>
                    </div>

                    <div class="collection-group">
                        <div class="collection-group-title">徽章收集 <span id="badge-count-label"></span></div>
                        <div class="badge-grid" id="badge-grid"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 升级动画遮罩 -->
    <div class="levelup-overlay" id="levelup-overlay" style="display:none;">
        <div class="levelup-rays" id="levelup-rays"></div>
        <div class="levelup-content">
            <div class="levelup-title">⚡ 等级提升！</div>
            <div class="levelup-avatar" id="levelup-avatar"></div>
            <div class="levelup-name" id="levelup-name"></div>
            <div class="levelup-subtitle" id="levelup-subtitle"></div>
        </div>
    </div>

    <!-- 获得卡片弹窗 -->
    <div class="card-modal-overlay" id="card-modal-overlay" style="display:none;">
        <div class="card-modal">
            <div class="card-modal-title">🎉 恭喜获得新卡片！</div>
            <div class="card-display" id="card-modal-card"></div>
            <button class="btn-primary card-modal-btn" id="card-modal-close">太棒了！</button>
        </div>
    </div>

    <!-- 卡片详情弹窗 -->
    <div class="card-modal-overlay" id="card-detail-overlay" style="display:none;">
        <div class="card-modal">
            <div class="card-display" id="card-detail-card"></div>
            <div class="card-detail-info" id="card-detail-info"></div>
            <button class="btn-secondary card-modal-btn" id="card-detail-close">关闭</button>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
